<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>口コミ詳細 - CloudTechホテル</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="header__title">CloudTechホテル 口コミ</h1>
            <nav class="header__nav">
                <a href="index.html" class="nav__link">口コミ一覧</a>
                <a href="create.html" class="nav__link">口コミを投稿</a>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <section class="review-detail">
                <div id="review-content" class="review-detail__content">
                    <p class="loading">読み込み中...</p>
                </div>
                <div class="review-detail__actions">
                    <a href="index.html" class="btn btn--secondary">一覧に戻る</a>
                    <button id="edit-btn" class="btn btn--primary">編集</button>
                    <button id="delete-btn" class="btn btn--danger">削除</button>
                </div>
            </section>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 CloudTechホテル</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (id) {
                loadReviewDetail(id);
            } else {
                document.getElementById('review-content').innerHTML = '<p class="error">口コミIDが指定されていません</p>';
            }
        });
    </script>
</body>
</html>
